workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign