workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Fix CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign