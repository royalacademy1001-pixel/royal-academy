name: royal_academy
description: "Royal Academy - E-Learning Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ================= 🔥 FIREBASE =================
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  cloud_functions: ^6.0.7

  # ================= 🎥 MEDIA =================
  image_picker: ^1.1.2
  video_player: ^2.9.1
  chewie: ^1.8.5
  youtube_player_iframe: ^5.1.0
  file_picker: ^8.0.7
  just_audio: ^0.9.36

  # ================= 📄 PDF + CERT =================
  qr_flutter: ^4.1.0
  pdf: ^3.10.8
  syncfusion_flutter_pdfviewer: ^27.2.3
  path_provider: ^2.1.3
  share_plus: ^7.2.2

  # ================= ⚡ CACHE =================
  shared_preferences: ^2.2.2
  flutter_cache_manager: ^3.3.2
  cached_network_image: ^3.3.1

  # ================= 🧠 UTILS =================
  intl: ^0.18.1
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3

  # ================= 🎨 UI =================
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.66.0
  # ================= 🔐 PERMISSIONS =================
  permission_handler: ^11.3.1

  # ================= 📱 DEVICE =================
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # ================= 🔔 OPTIONAL (PRO) =================
  flutter_local_notifications: ^17.1.2

  fl_chart: ^0.68.0

  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# ================= 🔥 APP ICON =================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  adaptive_icon_monochrome: "assets/logo.png"

# ================= 🔥 SPLASH =================
flutter_native_splash:
  color: "#000000"
  image: assets/logo.png
  android: true
  ios: true
  android_12:
    image: assets/logo.png
    color: "#000000"

# ================= 🔥 FLUTTER =================
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/   # 🔥 مهم جدًا (خليه زي كده بالظبط)

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700